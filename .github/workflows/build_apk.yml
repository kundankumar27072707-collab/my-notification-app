name: Flutter Build SECURE & OBFUSCATED APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clone Repository from GitHub Link
      run: |
        git clone https://github.com/jiusanzhou/flutter_notification_listener.git project

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install dependencies
      run: |
        cd project/example
        flutter pub get

    - name: Build Obfuscated and Locked APK
      run: |
        cd project/example
        mkdir -p build/app/outputs/symbols
        flutter build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols

    - name: Upload Secure APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SECURE-notification-apk
        path: project/example/build/app/outputs/flutter-apk/app-release.apk
