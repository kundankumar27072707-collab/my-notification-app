name: Flutter Build APK From Link

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. सीधे गिटहब लिंक से प्रोजेक्ट को क्लोन करो
    - name: Clone Repository from GitHub Link
      run: |
        git clone https://github.com/jiusanzhou/flutter_notification_listener.git project

    # 2. गिटहब के सर्वर पर नया जावा इंस्टॉल करो (Upgraded to v4)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. गिटहब के सर्ver पर फ्लूटर इंस्टॉल करो
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 4. पैकेजेस डाउनलोड करो और example फोल्डर के अंदर APK बिल्ड करो
    - name: Build APK
      run: |
        cd project/example
        flutter pub get
        flutter build apk --release

    # 5. बनी-बनाई APK फाइल को गिटहब पर अपलोड करो (Upgraded to v4)
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: jiusanzhou-notification-apk
        path: project/example/build/app/outputs/flutter-apk/app-release.apk
