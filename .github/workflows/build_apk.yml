name: Build SIGNED & OBFUSCATED APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. गिटहब लिंक से प्रोजेक्ट क्लोन करो
    - name: Clone Repository from GitHub Link
      run: |
        git clone https://github.com/jiusanzhou/flutter_notification_listener.git project

    # 2. जावा (JDK 17) इंस्टॉल करो
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. फ्लूटर इंस्टॉल करो
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 4. पैकेजेस डाउनलोड करो
    - name: Install dependencies
      run: |
        cd project/example
        flutter pub get

    # 5. पहले बिना किसी एरर के सुरक्षित ओब्फ्यूज्ड APK बना लो 🔐
    - name: Build Obfuscated APK
      run: |
        cd project/example
        mkdir -p build/app/outputs/symbols
        flutter build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols

    # 6. अब गिटहब के ऑफिशियल टूल से इस APK पर डिजिटल चाबी का ठप्पा लगाओ 🔑
    - name: Sign APK with Keystore
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: project/example/build/app/outputs/flutter-apk
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: my-key-alias
        keyStorePassword: my_secret_password_123
        keyPassword: my_secret_password_123
      env:
        BUILD_TOOLS_VERSION: "34.0.0"

    # 7. फाइनल साइन की हुई सुरक्षित APK को अपलोड करो
    - name: Upload Signed APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SIGNED-SECURE-notification-apk
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}
